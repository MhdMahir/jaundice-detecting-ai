<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password | Jaundice Detection AI</title>
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
    <script src="{{ url_for('static', filename='js/script.js') }}" defer></script>
  </head>
  <body>
    <div class="bg-canvas" aria-hidden="true">
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>
      <div class="orb orb-3"></div>
      <div class="grid-overlay"></div>
    </div>

    <!-- NAVBAR -->
    <header class="navbar-wrapper">
      <nav class="navbar">
        <div class="nav-sheen" aria-hidden="true"></div>
        <div class="logo">
          <div class="logo-icon">
            <span class="material-icons">local_hospital</span>
          </div>
          <span class="logo-text"
            >Jaundice<span class="logo-dot">AI</span></span
          >
        </div>
        <ul class="nav-links">
          <li><a href="/">Home</a></li>
          <li><a href="/#about">About</a></li>
        </ul>
        <div class="nav-right">
          <button class="btn-ghost" onclick="window.location.href = '/login'">
            <span class="material-icons" style="font-size: 18px"
              >arrow_back</span
            >
            Back to Login
          </button>
        </div>
      </nav>
    </header>

    <!-- FORGOT PASSWORD -->
    <section class="forgot-wrapper">
      <div class="forgot-card">
        <!-- Icon -->
        <div
          style="display: flex; justify-content: center; margin-bottom: 24px"
        >
          <div
            class="card-icon-wrap blue"
            style="width: 64px; height: 64px; border-radius: 18px"
          >
            <span class="material-icons" style="font-size: 32px"
              >lock_reset</span
            >
          </div>
        </div>

        <h2>Reset Password</h2>
        <p class="forgot-text">
          Enter your email address and we'll send you<br />a link to reset your
          password.
        </p>

        <form class="forgot-form" id="forgotForm" novalidate>
          <div class="field" style="width: 100%">
            <input type="email" id="resetEmail" placeholder=" " required />
            <label>Email Address</label>
          </div>

          <button
            type="submit"
            class="btn-primary"
            style="width: 100%; justify-content: center; margin-top: 4px"
          >
            <span class="material-icons" style="font-size: 18px">send</span>
            Send Reset Link
          </button>

          <p id="forgotStatus"></p>
        </form>

        <p class="forgot-back">
          Remember your password? <a href="/login">Back to Login</a>
        </p>
      </div>
    </section>

    <script type="module" src="{{ url_for('static', filename='js/forgot-password.js') }}"></script>
  </body>
</html>
