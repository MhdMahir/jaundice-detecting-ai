<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile | Jaundice Detection AI</title>
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
    <script src="{{ url_for('static', filename='js/script.js') }}" defer></script>
    <script type="module" src="{{ url_for('static', filename='js/auth-actions.js') }}"></script>
    <script type="module" src="{{ url_for('static', filename='js/profile.js') }}"></script>
  </head>
  <body>
    <div class="bg-canvas" aria-hidden="true">
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>
      <div class="orb orb-3"></div>
      <div class="grid-overlay"></div>
    </div>

    <header class="navbar-wrapper">
      <nav class="navbar">
        <div class="nav-sheen" aria-hidden="true"></div>
        <div class="logo">
          <div class="logo-icon">
            <span class="material-icons">local_hospital</span>
          </div>
          <span class="logo-text"
            >Jaundice<span class="logo-dot">AI</span></span
          >
        </div>

        <ul class="nav-links">
          <li><a href="/">Home</a></li>
          <li><a href="/#about">About</a></li>
          <li><a href="/#how-it-works">How It Works</a></li>
        </ul>

        <div class="nav-right">
          <button
            class="btn-ghost"
            onclick="window.location.href = '/upload'"
          >
            <span class="material-icons" style="font-size: 18px"
              >cloud_upload</span
            >
            Upload
          </button>

          <div class="profile-wrapper">
            <button
              class="profile-btn"
              id="profileToggle"
              aria-label="Account menu"
            >
              <span class="material-icons">account_circle</span>
            </button>
            <div class="profile-menu" id="profileMenu" role="menu">
              <a href="/profile" role="menuitem"
                ><span class="material-icons">person</span>Edit Profile</a
              >
              <a href="/profile#settings" role="menuitem"
                ><span class="material-icons">settings</span>Settings</a
              >
              <div class="menu-divider"></div>
              <button id="logoutBtn" role="menuitem">
                <span class="material-icons">logout</span>Log Out
              </button>
            </div>
          </div>
        </div>
      </nav>
    </header>

    <main class="profile-page-wrapper">
      <section class="profile-page-card">
        <div class="profile-page-header">
          <div class="profile-avatar" id="profileInitials">JA</div>
          <div>
            <span class="section-label">Account</span>
            <h2 id="profileSummaryName">Your profile</h2>
            <p id="profileSummaryEmail">Loading account...</p>
          </div>
        </div>

        <form id="profileForm" class="profile-form">
          <div class="profile-field-grid">
            <div class="field">
              <input id="profileName" type="text" placeholder=" " required />
              <label>Full Name</label>
            </div>

            <div class="field">
              <input id="profileEmail" type="email" placeholder=" " readonly />
              <label>Email Address</label>
            </div>

            <div class="field">
              <input id="profilePhone" type="tel" placeholder=" " />
              <label>Phone Number</label>
            </div>

            <div class="field">
              <input id="profileRole" type="text" placeholder=" " />
              <label>Role</label>
            </div>

            <div class="field profile-wide-field">
              <input id="profileOrganization" type="text" placeholder=" " />
              <label>Hospital or Organization</label>
            </div>
          </div>

          <div class="profile-actions">
            <button type="submit" class="btn-primary">
              <span class="material-icons" style="font-size: 18px">save</span>
              Save Profile
            </button>
            <button type="button" class="btn-ghost" id="resetPasswordBtn">
              <span class="material-icons" style="font-size: 18px"
                >lock_reset</span
              >
              Reset Password
            </button>
          </div>

          <p id="profileStatus" class="auth-message" aria-live="polite"></p>
        </form>

        <form id="settingsForm" class="profile-settings" aria-labelledby="settings">
          <div class="profile-section-header">
            <span class="section-label" id="settings">Settings</span>
            <h3>Preferences</h3>
          </div>

          <label class="toggle-row">
            <span>
              <strong>Remember last upload</strong>
              <small>Keep the latest image and result on this device.</small>
            </span>
            <input type="checkbox" id="rememberUpload" checked />
          </label>

          <label class="toggle-row">
            <span>
              <strong>Show result hints</strong>
              <small>Display screening guidance on the result page.</small>
            </span>
            <input type="checkbox" id="resultHints" checked />
          </label>

          <label class="toggle-row">
            <span>
              <strong>Email updates</strong>
              <small>Save this preference for account notifications.</small>
            </span>
            <input type="checkbox" id="emailUpdates" />
          </label>

          <div class="profile-actions">
            <button type="submit" class="btn-primary">
              <span class="material-icons" style="font-size: 18px">tune</span>
              Save Settings
            </button>
            <a class="btn-ghost" href="/upload">
              <span class="material-icons" style="font-size: 18px"
                >cloud_upload</span
              >
              Upload Image
            </a>
          </div>

          <p id="settingsStatus" class="auth-message" aria-live="polite"></p>
        </form>
      </section>
    </main>
  </body>
</html>
