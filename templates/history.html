<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>History | Jaundice Detection AI</title>
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
    <script src="{{ url_for('static', filename='js/script.js') }}" defer></script>
    <script type="module" src="{{ url_for('static', filename='js/auth-actions.js') }}"></script>
    <script src="{{ url_for('static', filename='js/history.js') }}" defer></script>
  </head>
  <body>
    <div class="bg-canvas" aria-hidden="true">
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>
      <div class="orb orb-3"></div>
      <div class="grid-overlay"></div>
    </div>

    <header class="navbar-wrapper">
      <nav class="navbar">
        <div class="nav-sheen" aria-hidden="true"></div>
        <div class="logo">
          <div class="logo-icon">
            <span class="material-icons">local_hospital</span>
          </div>
          <span class="logo-text"
            >Jaundice<span class="logo-dot">AI</span></span
          >
        </div>

        <ul class="nav-links">
          <li><a href="/">Home</a></li>
          <li><a href="/#about">About</a></li>
          <li><a href="/#how-it-works">How It Works</a></li>
        </ul>

        <div class="nav-right">
          <button class="btn-ghost" onclick="window.location.href = '/upload'">
            <span class="material-icons" style="font-size: 18px"
              >cloud_upload</span
            >
            Upload
          </button>

          <div class="profile-wrapper">
            <button
              class="profile-btn"
              id="profileToggle"
              aria-label="Account menu"
            >
              <span class="material-icons">account_circle</span>
            </button>
            <div class="profile-menu" id="profileMenu" role="menu">
              <a href="/profile" role="menuitem"
                ><span class="material-icons">person</span>Edit Profile</a
              >
              <a href="/profile#settings" role="menuitem"
                ><span class="material-icons">settings</span>Settings</a
              >
              <div class="menu-divider"></div>
              <button id="logoutBtn" role="menuitem">
                <span class="material-icons">logout</span>Log Out
              </button>
            </div>
          </div>
        </div>
      </nav>
    </header>

    <main class="history-wrapper">
      <section class="history-shell">
        <div class="history-header">
          <div>
            <span class="section-label">Screening History</span>
            <h1>Past Uploads</h1>
            <p id="historySummary">
              Review previous images and their AI screening result.
            </p>
          </div>

          <div class="history-actions">
            <button class="btn-ghost" id="clearHistoryBtn" type="button">
              <span class="material-icons" style="font-size: 18px">delete</span>
              Clear
            </button>
            <button
              class="btn-primary"
              type="button"
              onclick="window.location.href = '/upload'"
            >
              <span class="material-icons" style="font-size: 18px"
                >cloud_upload</span
              >
              Upload Image
            </button>
          </div>
        </div>

        <div id="historyList" class="history-grid" aria-live="polite"></div>
      </section>
    </main>
  </body>
</html>
