<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up | Jaundice Detection AI</title>
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
    <script
      src="{{ url_for('static', filename='js/script.js') }}"
      defer
    ></script>
  </head>
  <body>
    <div class="bg-canvas" aria-hidden="true">
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>
      <div class="orb orb-3"></div>
      <div class="grid-overlay"></div>
    </div>

    <!-- NAVBAR -->
    <header class="navbar-wrapper">
      <nav class="navbar">
        <div class="nav-sheen" aria-hidden="true"></div>
        <div class="logo">
          <div class="logo-icon">
            <span class="material-icons">local_hospital</span>
          </div>
          <span class="logo-text"
            >Jaundice<span class="logo-dot">AI</span></span
          >
        </div>
        <ul class="nav-links">
          <li><a href="/">Home</a></li>
          <li><a href="/#about">About</a></li>
          <li><a href="/#how-it-works">How It Works</a></li>
        </ul>
        <div class="nav-right">
          <button
            class="btn-ghost"
            onclick="window.location.href = '/#contact'"
          >
            Contact
          </button>
        </div>
      </nav>
    </header>

    <!-- SIGN UP -->
    <section class="login-wrapper" style="padding-top: 110px">
      <div class="login-card">
        <!-- LEFT IMAGE -->
        <div class="login-image">
          <img
            src="{{ url_for('static',
filename='assets/download.jfif') }}"
          />
          <div class="login-image-overlay"></div>
        </div>

        <!-- RIGHT FORM -->
        <div class="login-form">
          <div class="trust-badge" style="margin-bottom: 20px">
            <span class="badge-dot"></span>
            Create Account
          </div>

          <h2>Get<br /><span class="gradient-text">Started</span></h2>
          <p class="form-sub">Join thousands of clinicians using JaundiceAI.</p>

          <form id="signupForm">
            <div class="field">
              <input id="name" type="text" placeholder=" " required />
              <label>Full Name</label>
              <small class="input-error" id="nameError"></small>
            </div>

            <div class="field">
              <input
                id="signupEmail"
                type="email"
                placeholder=" "
                autocomplete="email"
                required
              />
              <label>Email Address</label>
              <small class="input-error" id="emailError"></small>
            </div>

            <div class="field">
              <input
                id="signupPhone"
                type="tel"
                placeholder=" "
                autocomplete="tel"
                required
              />
              <label>Phone Number</label>
              <small class="input-error" id="phoneError"></small>
            </div>

            <div class="field">
              <input
                id="signupPassword"
                type="password"
                placeholder=" "
                required
              />
              <label>Password</label>
              <small class="input-error" id="passwordError"></small>
            </div>

            <div class="field">
              <input
                id="confirmPassword"
                type="password"
                placeholder=" "
                required
              />
              <label>Confirm Password</label>
              <small class="input-error" id="confirmError"></small>
            </div>

            <button type="submit" id="signupBtn" class="btn-primary full">
              <span class="material-icons" style="font-size: 18px"
                >person_add</span
              >
              Create Account
            </button>

            <small class="form-error" id="formError"></small>

            <p class="signup-text">
              Already have an account? <a href="/login">Login</a>
            </p>
          </form>
        </div>
      </div>
    </section>

    <script
      type="module"
      src="{{ url_for('static', filename='js/signup.js') }}"
    ></script>
  </body>
</html>
